name: Matrix Módulo 7

run-name: "Matrix — ${{ github.actor }} @ ${{ github.ref_name }} #${{ github.run_number }}"

on:
  push:
    branches:
      - master
      - feature/**

permissions:
  contents: read

concurrency:
  group: matrix-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  define-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      versoes: ${{ steps.set-versoes.outputs.lista }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Definir versões do Node.js a testar
        id: set-versoes
        run: |
          echo "=== Definindo matrix dinâmica ==="

          # Em produção, isso poderia ler do package.json:
          # VERSOES=$(node -e "const p=require('./package.json'); console.log(JSON.stringify(['18','20']))")

          # Para o laboratório, usamos um valor fixo simulando leitura dinâmica
          VERSOES='["18","20"]'

          echo "Versões definidas: $VERSOES"
          echo "lista=$VERSOES" >> $GITHUB_OUTPUT

      - name: Confirmar output exportado
        run: |
          echo "Output exportado: ${{ steps.set-versoes.outputs.lista }}"
          echo "Este valor será consumido pelo job test via fromJSON()"

  test:
    needs: define-matrix
    timeout-minutes: 15

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        versao: ${{ fromJSON(needs.define-matrix.outputs.versoes) }}
        os: [ubuntu-latest, windows-latest]

    name: "Test — ${{ matrix.os }} / Node ${{ matrix.versao }}"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configurar Node.js ${{ matrix.versao }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ matrix.versao }}

      - name: Verificar ambiente do runner
        run: |
          echo "=== Ambiente do Runner ==="
          echo "OS declarado  : ${{ matrix.os }}"
          echo "Node declarado: ${{ matrix.versao }}"
          echo "Node instalado: $(node --version)"
          echo "npm instalado : $(npm --version)"
          echo "Runner OS real: ${{ runner.os }}"

      - name: Simular instalação de dependências
        run: echo "npm ci executado no ${{ matrix.os }} com Node ${{ matrix.versao }}"

      - name: Simular execução de testes
        run: |
          echo "Executando testes..."
          echo "Resultado: PASS — ${{ matrix.os }} / Node ${{ matrix.versao }}"
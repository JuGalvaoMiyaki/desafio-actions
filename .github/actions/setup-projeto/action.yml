name: Setup do Projeto Módulo 5
description: >
  Faz checkout do repositório, configura o Node.js,
  restaura o cache de dependências e executa npm ci.

inputs:
  node-version:
    description: "Versão do Node.js a instalar"
    required: false
    default: "20"

runs:
  using: composite

  steps:

    - name: Configurar Node.js
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Restaurar cache de dependências
      uses: actions/cache@d4323d4df104b026c6a166049fb557cb5d0bedfc  # v4.2.0
      with:
        path: ~/.npm
        key: npm-${{ inputs.node-version }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          npm-${{ inputs.node-version }}-
          npm-

    - name: Instalar dependências
      run: npm ci --prefer-offline
      shell: bash